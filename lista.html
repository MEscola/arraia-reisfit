<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arraiá ReisFit — Quem vai? 👀</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Garante que a seção apareça perfeitamente na tela */
        #tela-lista {
            display: block;
        }
        /* Ajuste de distanciamento das bordas da tela para mobile */
        .container {
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <img src="assets/images/banner.png" alt="Banner Arraiá">
    </header>

    <div class="container">
        <section id="tela-lista">
            <!-- MANTIDO O AMARELO ORIGINAL DO ARRAIÁ AQUI: -->
            <h2 style="color: #FFC107; margin-bottom: 20px; font-weight: 700; letter-spacing: 0.5px;">Lista de Pratos e Convidados 🥐</h2>
            <div id="lista-alunos-container">Carregando dados ...</div>
        </section>
    </div>

    <nav>
        <div class="nav-bar">
            <a href="index.html" class="nav-item" style="text-decoration: none;">📝 EU VOU!</a>
            <a href="lista.html" class="nav-item active" style="text-decoration: none;">👀Quem vai?</a>
            <a href="#" class="nav-item" style="text-decoration: none;" onclick="verificarAcessoAdmRedirecionamento()">🔑 Caixa ADM</a>
        </div>
    </nav>

    <!-- Forçando a atualização total de cache com o parâmetro v=6 -->
    <script src="js/supabase.js?v=6"></script>
    <script src="js/lista.js?v=6"></script>
    <script>
        function verificarAcessoAdmRedirecionamento() {
            const senhaDigitada = prompt("Digite a senha do Financeiro ADM:");
            if (!senhaDigitada) return;

            const senhaTratada = senhaDigitada.toLowerCase().trim();
            const senhaMascarada = "6202tifsier";
            const senhaCorreta = senhaMascarada.split('').reverse().join('');

            if (senhaTratada === senhaCorreta) {
                sessionStorage.setItem('reisfit_adm_auth', 'autorizado');
                window.location.href = "adm.html?v=6";
            } else {
                alert("Senha incorreta, acesso negado!");
            }
        }
    </script>
</body>
</html>
