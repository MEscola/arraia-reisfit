    <script>
        // Função com criptografia para proteger a nova senha minúscula do ADM
        async function verificarAcessoAdmRedirecionamento() {
            const senhaDigitada = prompt("Digite a senha do Financeiro ADM:");
            if (!senhaDigitada) return;

            // Força a entrada ficar em minúsculo para blindar contra o corretor do celular
            const senhaTratada = senhaDigitada.toLowerCase().trim();

            // Transforma a senha digitada em um Hash SHA-256
            const msgBuffer = new TextEncoder().encode(senhaTratada);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');


            const hashCorreto = "1056f7097746bc5e96646b97e596706e226d9c6e3b2e7208170b021313426e78";

            if (hashHex === hashCorreto) {
                window.location.href = "adm.html";
            } else {
                alert("Senha incorreta, acesso negado!");
            }
        }
    </script>
