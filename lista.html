            display: block;
        }
    </style>

<body>

    <header>
        <img src="assets/images/banner.png" alt="Banner Arraiá">
    </header>

    <div class="container">
        <section id="tela-lista">
            <h2 style="color: #FFC107; margin-bottom: 15px;">Quem vai e o que vai levar 🤠</h2>
            <div id="lista-alunos-container">Carregando dados da mesa coletiva...</div>
        </section>
    </div>

    <nav>
        <div class="nav-bar">
            <a href="index.html" class="nav-item" style="text-decoration: none;">📝 EU VOU!</a>
            <a href="lista.html" class="nav-item active" style="text-decoration: none;">👀Quem vai?</a>
            <a href="#" class="nav-item" style="text-decoration: none;"
                onclick="verificarAcessoAdmRedirecionamento()">🔑 Caixa ADM</a>
        </div>
    </nav>

    <script src="js/supabase.js"></script>
    <script src="js/lista.js"></script> <!-- Garanta que está puxando o script da lista aqui se necessário -->
    <script>
        function verificarAcessoAdmRedirecionamento() {
            const senhaDigitada = prompt("Digite a senha do Financeiro ADM:");
            if (!senhaDigitada) return;

            // Transforma tudo para minúsculo e limpa espaços invisíveis
            const senhaTratada = senhaDigitada.toLowerCase().trim();

            // Mesma técnica de segurança por inversão de texto pura (funciona em qualquer celular)
            const senhaSecretaEscondida = "6202tif建设项目".replace("建设项目", "sier");
            const senhaCorreta = senhaSecretaEscondida.split('').reverse().join('');

            if (senhaTratada === senhaCorreta) {
                window.location.href = "adm.html";
            } else {
                alert("Senha incorreta, acesso negado!");
            }
        }
    </script>
</body>
