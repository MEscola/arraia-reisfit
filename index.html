<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arraiá ReisFit — Cadastro 🤠🔥</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <img src="assets/images/banner.png" alt="Banner Arraiá ReisFit">
    </header>

    <div class="container">
        <h1>🤠 Cadastro</h1>

        <section id="tela-cadastro">
            <form id="form-inscricao">

                <div class="form-card">
                    <div class="form-group">
                        <label for="nome">Qual o seu nome? (Titular)</label>
                        <input type="text" id="nome" required placeholder="Digite seu nome completo">
                    </div>

                    <div class="sponsor-box">
                        <div class="sponsor-info">
                            <strong>Sou Box Friendly 🤝</strong>
                            <p>Vou ajudar com os brindes do bingo e ganhar benefícios de isenção.</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="patrocinador" onchange="controlarFluxoPatrocinio()">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div id="grupo-valor-doacao" class="form-group hidden" style="margin-top: -10px; margin-bottom: 20px; border-left: 3px solid var(--accent-color); padding-left: 15px;">
                        <label for="valor_doacao">Qual o valor da doação? (R$)</label>
                        <input type="number" id="valor_doacao" min="0" placeholder="Ex: 50 ou 100" oninput="calcularPix()">
                        <small style="color: var(--text-secondary); display: block; margin-top: 5px; font-size: 12px; line-height: 1.3;">
                            💡 A partir de <strong>R$ 50</strong> isenta o Titular.<br>
                            💡 A partir de <strong>R$ 100</strong> isenta a Família inteira!
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="tipo_grupo">Como você vem?</label>
                        <select id="tipo_grupo" onchange="ajustarFluxoGrupo()" required>
                            <option value="Solteiro">Vou Sozinho (1 pessoa)</option>
                            <option value="Casal/Família">Vou em Casal / Família</option>
                        </select>
                    </div>
                </div>

                <div id="campos-acompanhantes" class="form-card hidden">
                    <div class="form-group">
                        <label for="qtd_conjuge">Cônjuges/Filhos > 13 anos (R$ 15,00 cada)</label>
                        <input type="number" id="qtd_conjuge" min="0" value="0" oninput="calcularPix()">
                    </div>
                    <div class="form-group">
                        <label for="qtd_amigos">Amigos/Visitantes (R$ 20,00 cada)</label>
                        <input type="number" id="qtd_amigos" min="0" value="0" oninput="calcularPix()">
                    </div>
                    <div class="form-group">
                        <label for="criancas">Crianças < 13 anos (Não pagam)</label>
                        <textarea id="criancas" rows="2" placeholder="Liste nomes e idades para controle..."></textarea>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label for="leva_caldo">Você vai levar algum caldo?</label>
                        <select id="leva_caldo" onchange="controlarOpcoesCaldos()">
                            <option value="Não">Não</option>
                            <option value="Sim">Sim</option>
                        </select>
                    </div>

                    <div id="grupo-sabores-caldo" class="form-group hidden">
                        <label for="sabor_caldo">Escolha o sabor do caldo:</label>
                        <select id="sabor_caldo">
                            </select>
                    </div>

                    <div id="secao-pratos-dinamica">
                        <div id="fluxo-solteiro" class="form-group">
                            <label for="prato_solteiro">Qual o prato você vai levar?</label>
                            <select id="prato_solteiro" onchange="controlarSaborSolteiro()">
                                <option value="">Selecione...</option>
                                <option value="Doce">Prato Doce 🍫</option>
                                <option value="Salgado">Prato Salgado 🥐</option>
                            </select>
                            <div id="grupo-sabor-solteiro" class="form-group hidden" style="margin-top:10px;">
                                <label for="sabor_prato_solteiro">Especifique o prato que vai trazer:</label>
                                <input type="text" id="sabor_prato_solteiro" placeholder="Ex: Bolo de milho">
                            </div>
                        </div>

                        <div id="fluxo-familia" class="hidden">
                            <div class="form-group">
                                <label for="sabor_doce_familia">Seu Prato Doce 🍫 (Obrigatório):</label>
                                <input type="text" id="sabor_doce_familia" placeholder="Ex: Canjica Doce">
                            </div>
                            <div class="form-group">
                                <label for="sabor_salgado_familia">Seu Prato Salgado 🥐 (Obrigatório):</label>
                                <input type="text" id="sabor_salgado_familia" placeholder="Ex: Empadão">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pix-box">
                    <p>Total do investimento via PIX</p>
                    <div class="pix-value" id="label-pix">R$ 15,00</div>
                    <div class="pix-key">Chave PIX: recepcao@reisfit.com.br</div>
                </div>

                <button type="submit" id="btn-enviar" class="btn btn-primary">Confirmar Cadastro</button>
            </form>
        </section>
    </div>

    <nav>
        <div class="nav-bar">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">📝</span>
                <span>Eu VOU!</span>
            </a>
            <a href="lista.html" class="nav-item">
                <span class="nav-icon">👀</span>
                <span>Quem vai?</span>
            </a>
            <a href="#" class="nav-item" onclick="verificarAcessoAdmRedirecionamento()">
                <span class="nav-icon">🔑</span>
                <span>ADM</span>
            </a>
        </div>
    </nav>

    <script src="js/supabase.js"></script>
    <script src="js/cadastro.js"></script> <!-- No lista.html, use js/lista.js se necessário -->
    <script>
        // Função com criptografia para proteger a nova senha minúscula do ADM
        async function verificarAcessoAdmRedirecionamento() {
            const senhaDigitada = prompt("Digite a senha do Financeiro ADM:");
            if (!senhaDigitada) return;

            // Força a entrada ficar em minúsculo para blindar contra o corretor do celular
            const senhaTratada = senhaDigitada.toLowerCase().trim();

            // Transforma a senha digitada em um Hash SHA-256
            const msgBuffer = new TextEncoder().encode(senhaTratada);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            const hashCorreto = "bf258b389ee42a84976722237000dfb42fa0e66ff7c0fb6097ff8b71329bf337";

            if (hashHex === hashCorreto) {
                window.location.href = "adm.html";
            } else {
                alert("Senha incorreta, acesso negado!");
            }
        }
    </script>
</body>
</html>
