<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arraiá ReisFit — Financeiro ADM 🔑</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Container de segurança para esconder o painel antes da autenticação */
        .conteudo-restrito { display: none; }
        .conteudo-restrito.autorizado { display: block; }
        
        /* Estilo dos Badges de Status do app */
        .badge-pago {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <img src="assets/images/banner.png" alt="Banner Arraiá ReisFit">
    </header>

    <div class="container">
        <div id="bloco-seguro" class="conteudo-restrito">
            <h1>🔑 Painel Financeiro</h1>
            
            <!-- Dashboard de Indicadores estilo FinTech -->
            <div class="form-card" style="display: flex; flex-direction: column; gap: 12px; border: 1px solid #333;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--text-secondary); font-size: 14px;">Previsão de Caixa:</span>
                    <strong id="total-caixa" style="color: #4CAF50; font-size: 18px; font-weight: 800;">R$ 0,00</strong>
                </div>
                <div style="height: 1px; background: #333; width: 100%;"></div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--text-secondary); font-size: 14px;">Público Pagante Real:</span>
                    <strong id="total-pagantes" style="color: #00BCD4; font-size: 18px; font-weight: 800;">0 pessoas</strong>
                </div>
            </div>

            <!-- Tabela Administrativa modo Escuro -->
            <div class="form-card" style="padding: 10px; overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Participante</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-adm-corpo">
                        <!-- Injetado dinamicamente via js/adm.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Barra Inferior Mobile Integrada -->
    <nav>
        <div class="nav-bar">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">📝</span>
                <span>Eu VOU!</span>
            </a>
            <a href="lista.html" class="nav-item">
                <span class="nav-icon">👀</span>
                <span>Quem vai?</span>
            </a>
            <a href="adm.html" class="nav-item active">
                <span class="nav-icon">🔑</span>
                <span>ADM</span>
            </a>
        </div>
    </nav>

    <!-- Importação dos scripts com quebra de cache atualizada para v=4 -->
    <script src="js/supabase.js?v=4"></script>
    <script src="js/adm.js?v=4"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Checa se a memória temporária diz que você já foi autorizada na tela anterior
            const loginValido = sessionStorage.getItem('reisfit_adm_auth');

            if (loginValido === 'autorizado') {
                // Se sim, libera direto sem pedir nada!
                const blocoSeguro = document.getElementById('bloco-seguro');
                if (blocoSeguro) blocoSeguro.classList.add('autorizado');
                if (typeof carregarPainelADM === 'function') carregarPainelADM();
            } else {
                // Só pede a senha se você tentar acessar o link direto digitando na barra de endereço
                const senhaDigitada = prompt("Acesso Restrito. Digite a senha do Financeiro ADM:");
                if (!senhaDigitada) {
                    window.location.href = "index.html?v=4";
                    return;
                }

                const senhaTratada = senhaDigitada.toLowerCase().trim();
                const senhaMascarada = "6202tifsier";
                const senhaCorreta = senhaMascarada.split('').reverse().join('');

                if (senhaTratada === senhaCorreta) {
                    sessionStorage.setItem('reisfit_adm_auth', 'autorizado');
                    const blocoSeguro = document.getElementById('bloco-seguro');
                    if (blocoSeguro) blocoSeguro.classList.add('autorizado');
                    if (typeof carregarPainelADM === 'function') carregarPainelADM();
                } else {
                    alert("Senha incorreta!");
                    window.location.href = "index.html?v=4";
                }
            }
        });
    </script>
</body>
</html>
